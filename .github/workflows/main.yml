name: Robot_Lumina_Select

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions: # ESTO ES LO QUE NOS FALTA PARA QUE EL ROBOT PUEDA GUARDAR PRODUCTOS
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando archivos
        uses: actions/checkout@v4 # ACTUALIZADO

      - name: Configurando Python
        uses: actions/setup-python@v4 # ACTUALIZADO
        with:
          python-version: '3.9'

      - name: Instalando librerias
        run: pip install requests

      - name: Ejecutando Robot de Productos y Videos
        run: python ultra_automator.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
          PREDIS_AI_KEY: ${{ secrets.PREDIS_AI_KEY }}

      - name: Guardando cambios en la web
        run: |
          git config --global user.name 'LuminaBot'
          git config --global user.email 'bot@luminaselect.com'
          git add productos.json
          git commit -m "Actualización automática de inventario" || echo "No hay cambios para subir"
          git push

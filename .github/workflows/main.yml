name: Robot_Lumina_Select

on:
  schedule:
    - cron: '*/20 * * * *' # ESTO LE DICE A GITHUB: CADA 20 MINUTOS
  workflow_dispatch: # Mantiene el botón para hacerlo manual también

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python ultra_automator.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git commit -m "Update products automatically" || echo "No changes to commit"
          git push origin main

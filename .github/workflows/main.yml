import os
import json
import random
import requests
import time

OPENAI_API_KEY = os.getenv("OPENAI_API_KEY")

class RobustAutomator:
    def get_ai_data(self):
        url = "https://api.openai.com/v1/chat/completions"
        headers = {"Authorization": f"Bearer {OPENAI_API_KEY}", "Content-Type": "application/json"}
        prompt = "Crea un producto de lujo. Responde SOLO un JSON: {id, nombre, precio, categoria, descripcion, imagen(1 palabra ingles)}"
        
        try:
            # Si no hay API KEY o falla, usamos el plan B
            if not OPENAI_API_KEY: raise Exception("No Key")
            resp = requests.post(url, headers=headers, json={"model": "gpt-3.5-turbo","messages": [{"role": "user", "content": prompt}]}).json()
            data = json.loads(resp['choices'][0]['message']['content'])
            data['imagen'] = f"https://source.unsplash.com/featured/800x1000?{data['imagen']}"
            return data
        except:
            # PLAN B: Producto generado por código si la IA falla
            nombres = ["Reloj Minimal", "Lámpara Zen", "Bolso Curado", "Gadget Pro"]
            cats = ["Tecnología", "Hogar", "Estilo"]
            escogido = random.choice(nombres)
            return {
                "id": str(time.time()),
                "nombre": escogido + " " + str(random.randint(1,99)),
                "precio": random.randint(50, 500),
                "categoria": random.choice(cats),
                "descripcion": "Calidad garantizada por Lumina Select.",
                "imagen": "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800"
            }

    def run(self):
        file = 'productos.json'
        try:
            with open(file, 'r') as f: products = json.load(f)
        except: products = []

        products.append(self.get_ai_data())
        if len(products) > 10: products = products[-10:]

        with open(file, 'w') as f:
            json.dump(products, f, indent=4)
        print("Cambio realizado en productos.json")

if __name__ == "__main__":
    RobustAutomator().run()

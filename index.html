<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Select | Excellence in Curation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=AS8LYBGSRuf9o5qIetclbgdQ2hB0oM5vtWcV2JZ2If8wqNVjsXVbgMf8dIwlHo0sZu7VwW8hxhUiY4JM&currency=USD"></script>
    <style>
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; overflow-x: hidden; }
        .premium-border { border-bottom: 1px solid #e5e7eb; }
        .hero-zoom { transition: transform 20s linear; }
        .hero-zoom:hover { transform: scale(1.1); }
        .cart-drawer { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .cart-drawer.open { transform: translateX(0); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-white">

    <!-- Top Bar -->
    <div class="bg-stone-100 text-[10px] tracking-[0.2em] text-center py-2 uppercase font-semibold border-b">
        Envíos Prioritarios Globales & Garantía de Satisfacción de 30 Días
    </div>

    <!-- Navigation -->
    <nav class="premium-border sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-sm tracking-[0.4em] font-bold uppercase leading-none">LUMINA</span>
                <span class="text-[10px] tracking-[0.5em] font-light uppercase text-stone-400 mt-1">SELECT</span>
            </div>
            <div class="hidden md:flex space-x-10 text-[11px] uppercase tracking-widest font-semibold">
                <a href="#coleccion" class="hover:text-stone-500 transition">Colecciones</a>
                <a href="#filosofia" class="hover:text-stone-500 transition">Nuestra Filosofía</a>
            </div>
            <div class="flex items-center space-x-5">
                <button onclick="toggleCart()" class="text-[11px] uppercase tracking-widest font-bold border-b border-black">
                    Carrito (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white z-[100] shadow-2xl cart-drawer border-l p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="text-xl uppercase tracking-widest font-bold">Carrito</h2>
            <button onclick="toggleCart()" class="text-stone-400 hover:text-black">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-6"></div>
        <div class="border-t pt-6 mt-6">
            <div class="flex justify-between text-sm uppercase font-bold tracking-widest mb-6">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <div id="paypal-checkout-container"></div>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="relative h-[60vh] overflow-hidden bg-black text-white">
        <div class="absolute inset-0 opacity-60 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070" class="w-full h-full object-cover hero-zoom">
        </div>
        <div class="relative container mx-auto h-full flex flex-col justify-center px-6">
            <h1 class="text-5xl md:text-8xl max-w-4xl leading-tight">La curaduría del <br>mañana, hoy.</h1>
            <div class="mt-12">
                <a href="#coleccion" class="bg-white text-black px-12 py-5 text-xs uppercase tracking-widest font-bold hover:bg-stone-200 transition">Explorar Selección</a>
            </div>
        </div>
    </section>

    <!-- Categorías Dinámicas -->
    <div class="bg-white border-b overflow-x-auto sticky top-[73px] z-40">
        <div id="category-menu" class="container mx-auto px-6 py-4 flex space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <!-- Se llena solo -->
        </div>
    </div>

    <!-- Dynamic Collection -->
    <section id="coleccion" class="py-24 container mx-auto px-6">
        <div id="contenedor-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-20"></div>
    </section>

    <script>
        let todosLosProductos = [];
        let cart = JSON.parse(localStorage.getItem('lumina_cart')) || [];

        async function cargarProductos() {
            try {
                const response = await fetch('productos.json?v=' + Date.now());
                todosLosProductos = await response.json();
                
                renderCategories();
                mostrarProductos(todosLosProductos);
                updateCartUI();
            } catch (e) { console.error("Error cargando productos", e); }
        }

        function renderCategories() {
            const menu = document.getElementById('category-menu');
            const cats = ['Todos', ...new Set(todosLosProductos.map(p => p.categoria))];
            menu.innerHTML = '';
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.className = 'hover:text-stone-400 transition';
                btn.onclick = () => filtrar(cat);
                menu.appendChild(btn);
            });
        }

        function mostrarProductos(lista) {
            const container = document.getElementById('contenedor-productos');
            container.innerHTML = lista.map(p => `
                <div class="group">
                    <div class="aspect-[4/5] overflow-hidden bg-stone-100 mb-6">
                        <img src="${p.imagen}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                    </div>
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[9px] text-stone-400 uppercase tracking-widest">${p.categoria}</span>
                            <h3 class="text-sm font-semibold uppercase tracking-widest">${p.nombre}</h3>
                        </div>
                        <span class="text-sm">$${p.precio}</span>
                    </div>
                    <p class="text-xs text-stone-500 mb-6">${p.descripcion}</p>
                    <button onclick="addToCart('${p.id}')" class="w-full bg-black text-white text-[10px] uppercase tracking-widest font-bold py-4 hover:bg-stone-800 transition">
                        Añadir al Carrito
                    </button>
                </div>
            `).join('');
        }

        function filtrar(cat) {
            if (cat === 'Todos') mostrarProductos(todosLosProductos);
            else mostrarProductos(todosLosProductos.filter(p => p.categoria === cat));
        }

        function addToCart(id) {
            const p = todosLosProductos.find(x => x.id === id);
            const exists = cart.find(x => x.id === id);
            if (exists) exists.quantity++;
            else cart.push({...p, quantity: 1});
            localStorage.setItem('lumina_cart', JSON.stringify(cart));
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(item => `
                <div class="flex space-x-4">
                    <img src="${item.imagen}" class="h-20 w-16 object-cover">
                    <div class="flex-1">
                        <h4 class="text-xs font-bold uppercase">${item.nombre}</h4>
                        <p class="text-[10px]">$${item.precio} x ${item.quantity}</p>
                        <button onclick="removeFromCart('${item.id}')" class="text-[9px] text-red-400 underline">Eliminar</button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.precio * item.quantity), 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-count').innerText = cart.length;
            renderPaypal(total);
        }

        function removeFromCart(id) {
            cart = cart.filter(x => x.id !== id);
            localStorage.setItem('lumina_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart(open) {
            const drawer = document.getElementById('cart-drawer');
            if (open === true) drawer.classList.add('open');
            else if (open === false) drawer.classList.remove('open');
            else drawer.classList.toggle('open');
        }

        function renderPaypal(total) {
            const container = document.getElementById('paypal-checkout-container');
            container.innerHTML = '';
            if (total <= 0) return;
            paypal.Buttons({
                style: { layout: 'vertical', color: 'black', shape: 'rect' },
                createOrder: (data, actions) => actions.order.create({
                    purchase_units: [{ amount: { value: total.toFixed(2) }, description: 'Lumina Select Order' }]
                }),
                onApprove: (data, actions) => actions.order.capture().then(() => {
                    alert('Pago realizado');
                    cart = [];
                    localStorage.removeItem('lumina_cart');
                    updateCartUI();
                    toggleCart(false);
                })
            }).render('#paypal-checkout-container');
        }

        window.onload = cargarProductos;
    </script>

</html>
